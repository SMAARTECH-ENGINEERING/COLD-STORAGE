# ─── Nginx Configuration for Cold Storage Monitoring API ─────────────────────
# Place this file at: /etc/nginx/sites-available/cold-storage-api
# Enable with: sudo ln -s /etc/nginx/sites-available/cold-storage-api /etc/nginx/sites-enabled/
# Test with:   sudo nginx -t
# Reload with: sudo systemctl reload nginx

upstream cold_storage_api {
    least_conn;
    server 127.0.0.1:5000;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name api.coldstorage.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.coldstorage.com;

    # ─── SSL Certificates (Let's Encrypt) ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.coldstorage.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.coldstorage.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ─── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/cold-storage-api-access.log combined;
    error_log  /var/log/nginx/cold-storage-api-error.log warn;

    # ─── Limits ──────────────────────────────────────────────────────────────
    client_max_body_size 10M;

    # ─── Rate Limiting Zones ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ─── Health Check (no auth required) ─────────────────────────────────────
    location = /health {
        proxy_pass http://cold_storage_api;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── API Docs ─────────────────────────────────────────────────────────────
    location /api-docs {
        proxy_pass http://cold_storage_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Auth Endpoints (strict rate limit) ──────────────────────────────────
    location ~ ^/api/v1/auth/login {
        limit_req zone=auth burst=3 nodelay;
        proxy_pass http://cold_storage_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Socket.IO WebSocket ──────────────────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://cold_storage_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ─── API Endpoints ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://cold_storage_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ─── Block hidden files ───────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
